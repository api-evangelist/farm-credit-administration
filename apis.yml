description: >-
  The Farm Credit Administration (FCA) is an independent federal agency
  responsible for regulating and supervising the Farm Credit System, a
  nationwide network of cooperatively owned institutions that provide credit
  and financial services to farmers, ranchers, and other agricultural
  borrowers. The FCA ensures that the Farm Credit System operates in a safe
  and sound manner and provides fair and competitive services. FCA does not
  publish a public REST API; however, the FCS Data Portal and downloadable
  Call Reports provide programmatic access to financial data on Farm Credit
  System institutions.
